<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-base-100 text-base-content">
    <header class="navbar bg-base-200 px-6 border-b border-base-300">
        <div class="flex-1">
            <a href="#"
                class="group flex items-center text-2xl font-bold tracking-tight text-base-content hover:text-base-content/70 transition-colors cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 207 162"
                    class="h-10 w-auto mr-3 fill-current shrink-0">
                    <g>
                        <path
                            d="M 93.28 76.75 C90.23,80.74 87.00,83.97 86.11,83.93 C85.23,83.89 83.26,82.36 81.75,80.54 C79.15,77.41 79.00,76.67 79.00,67.11 L 79.00 57.00 L 40.00 57.00 L 40.00 54.18 C40.00,52.63 41.24,48.92 42.75,45.93 C45.06,41.37 46.38,40.06 51.00,37.73 L 56.50 34.96 L 98.95 35.23 L 141.40 35.50 L 133.45 40.14 C129.08,42.69 122.24,47.53 118.26,50.89 C112.90,55.41 110.23,57.00 108.01,57.00 C105.27,57.00 105.00,57.30 105.00,60.31 C105.00,62.71 104.15,64.44 101.92,66.56 C100.23,68.18 96.34,72.76 93.28,76.75 ZM 91.57 113.11 C86.57,115.38 86.43,115.38 81.49,113.13 C78.86,111.94 75.42,108.76 71.52,103.91 C62.64,92.86 56.25,86.35 52.95,84.98 C51.33,84.31 50.00,83.41 50.00,82.98 C50.00,81.46 56.90,76.19 60.41,75.03 C65.94,73.21 70.26,75.15 77.35,82.63 C81.77,87.30 84.08,89.00 86.00,89.00 C89.43,89.00 90.70,87.92 97.76,79.00 C106.04,68.52 120.05,54.91 128.72,48.91 C143.57,38.65 159.64,33.00 174.01,33.00 C181.53,33.00 182.70,34.31 176.12,35.36 C170.10,36.33 152.84,45.43 144.75,51.91 C130.94,62.98 118.35,77.46 103.95,98.88 C97.08,109.11 94.92,111.58 91.57,113.11 ZM 97.01 144.75 C94.32,146.58 92.33,147.00 86.35,147.00 L 79.00 147.00 L 79.00 118.29 L 83.95 118.77 C91.12,119.46 93.58,118.52 99.71,112.72 L 105.20 107.52 L 104.85 122.19 C104.46,138.42 103.89,140.07 97.01,144.75 Z"
                            fill="currentColor" />
                    </g>
                </svg>
                <span>Tickivo</span>
                <span id="openCount" class="badge badge-primary badge-sm ml-2 hidden">0</span>
            </a>
        </div>
        <div class="flex-none">
            <div class="flex items-center gap-2">
                <span class="text-xs font-medium text-base-content/70 hidden sm:inline">Theme:</span>
                <select id="themeSwitcher" class="select select-bordered select-sm w-40">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="meadow">Meadow</option>
                    <option value="silk">Silk</option>
                    <option value="coffee">Coffee</option>
                    <option value="lavendel">Lavendel</option>
                </select>
            </div>
        </div>
    </header>

    <main class="min-h-screen flex flex-col items-center pt-8 px-4">
        <div id="globalLoader" class="flex justify-center my-4 hidden">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div class="w-full max-w-3xl space-y-4">

            <!-- New Todo Input -->
            <div class="bg-base-200 border-2 border-base-300 rounded-box p-5">
                <label class="label">
                    <span class="label-text font-semibold text-base">New Todo</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" id="taskInput" maxlength="100"
                        class="input input-bordered flex-1 bg-base-100 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="What needs to be done?">
                    <button class="btn btn-neutral hover:btn-primary transition-all duration-200 shrink-0" id="addTask">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                                clip-rule="evenodd" />
                        </svg>
                        Add
                    </button>
                </div>
                <div class="flex justify-end mt-1">
                    <span id="charCount" class="text-xs text-base-content/40">0 / 100</span>
                </div>
            </div>

            <!-- Open Todos -->
            <div class="bg-base-200 border-2 border-base-300 rounded-box p-5">
                <h2
                    class="text-sm font-bold uppercase tracking-wider text-base-content/70 mb-4 flex items-center gap-2">
                    <div class="w-2 h-2 bg-info rounded-full"></div>
                    Open Todos
                </h2>
                <ul id="openTask" class="flex flex-col gap-2"></ul>
                <div id="noOpenTask" class="text-center py-12 text-base-content/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-3 opacity-40" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <p class="text-sm font-medium">No open tasks yet</p>
                    <p class="text-xs opacity-70 mt-1">Add one above to get started!</p>
                </div>
            </div>

            <!-- Completed Todos -->
            <div class="bg-base-200 border-2 border-base-300 rounded-box p-5">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-base-content/70 flex items-center gap-2">
                        <div class="w-2 h-2 bg-success rounded-full"></div>
                        Completed
                    </h2>
                    <button id="clearCompleted" class="btn btn-ghost btn-xs text-error hidden">
                        <i class="fa-solid fa-trash-can mr-1"></i> Clear all
                    </button>
                </div>
                <ul id="completedList" class="flex flex-col gap-2"></ul>
                <div id="noCompletedTask" class="text-center py-12 text-base-content/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-3 opacity-40" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-sm font-medium">Nothing completed yet</p>
                    <p class="text-xs opacity-70 mt-1">Check off tasks to see them here</p>
                </div>
            </div>

        </div>

        <!-- Edit Modal -->
        <div id="editModal"
            class="hidden fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-50 p-4">
            <div
                class="bg-base-100 rounded-lg shadow-xl w-full max-w-md transform transition-all border border-base-300">
                <div class="flex items-center justify-between p-4 border-b border-base-300">
                    <h2 class="text-lg font-semibold text-base-content">Edit Todo</h2>
                </div>
                <div class="p-5">
                    <label class="block text-sm font-medium text-base-content/80 mb-2">Task text</label>
                    <input id="editInput" type="text"
                        class="input input-bordered w-full bg-base-200 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="Enter task text..." />
                </div>
                <div class="flex justify-end gap-2 p-4 bg-base-200 rounded-b-lg border-t border-base-300">
                    <button id="cancelEdit" class="btn btn-ghost">Cancel</button>
                    <button id="saveEdit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                clip-rule="evenodd" />
                        </svg>
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/todos/todoManager.js"></script>
    <script>
        const themeSwitcher = document.getElementById('themeSwitcher');

        let savedTheme = localStorage.getItem('theme') || 'light';
        savedTheme = savedTheme.toLowerCase();

        document.documentElement.setAttribute('data-theme', savedTheme);
        themeSwitcher.value = savedTheme;

        themeSwitcher.addEventListener('change', (e) => {
            const newTheme = e.target.value.toLowerCase();
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
