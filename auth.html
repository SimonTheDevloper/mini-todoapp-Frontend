<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn/SignUp</title>
    <link rel="stylesheet" href="./dist/output.css">
    <style>
        .form-panel {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .form-panel.form-hidden {
            display: none;
            opacity: 0;
            transform: translateY(12px);
        }

        .form-panel.form-leaving {
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
        }
    </style>
</head>

<body class="flex min-h-screen items-center justify-center bg-base-600" data-theme="light">
    <main class="w-full max-w-md px-4">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Welcome</h1>
            <p class="text-gray-600">Manage your tasks efficiently</p>
        </div>

        <form id="logInForm" class="bg-base-200 border-2 border-base-300 rounded-box p-6 space-y-4 form-panel">
            <legend class="text-2xl font-bold text-gray-800 mb-4">Login</legend>

            <div>
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Email</span>
                </label>
                <input type="email" class="input input-bordered w-full bg-base-100" name="email"
                    placeholder="your@email.com" required>
            </div>

            <div>
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <div class="relative">
                    <input type="password" name="password" class="input input-bordered w-full bg-base-100 pr-12"
                        placeholder="••••••••" required>
                    <button type="button"
                        class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                        <svg class="eye-open w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="eye-closed w-5 h-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-neutral mt-4 w-full hover:btn-primary transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z"
                        clip-rule="evenodd" />
                </svg>
                Login
            </button>

            <p id="loginMsg" class="mt-2 text-sm text-center"></p>
            <p id="switchToSignUp" class="link link-primary mt-4 text-center text-sm cursor-pointer hover:underline">
                New here? Create an account
            </p>
        </form>

        <form id="signUpForm" class="bg-base-200 border-2 border-base-300 rounded-box p-6 space-y-4 form-panel hidden">
            <legend class="text-2xl font-bold text-gray-800 mb-4">Create Account</legend>

            <div>
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Username</span>
                </label>
                <input type="text" name="username" class="input input-bordered w-full bg-base-100" placeholder="tim"
                    required>
            </div>

            <div>
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Email</span>
                </label>
                <input type="email" name="email" class="input input-bordered w-full bg-base-100"
                    placeholder="deine@email.de" required>
            </div>

            <div>
                <label class="label">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <div class="relative">
                    <input type="password" name="password" class="input input-bordered w-full bg-base-100 pr-12"
                        placeholder="••••••••" required>
                    <button type="button"
                        class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                        <svg class="eye-open w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="eye-closed w-5 h-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-neutral mt-4 w-full hover:btn-primary transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path
                        d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6zM16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z" />
                </svg>
                Create Account
            </button>
            <p id="signUpMsg" class="mt-2 text-sm text-center"></p>
            <p id="switchToLogIn" class="link link-primary mt-4 text-center text-sm cursor-pointer hover:underline">
                Already have an account? Login
            </p>
        </form>
    </main>
    <script type="module" src="/js/login/login.js"></script>
</body>

</html>
